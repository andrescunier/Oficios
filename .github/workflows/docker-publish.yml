name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: diap-ecommerce

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - environment: production
            api_url: https://api.cumar.com.ar
            account_id: 37b694f4-f2c9-4500-8e47-52b8ad8daaea
            image_suffix: ""
          - environment: qa
            api_url: https://apiqa.cumar.com.ar
            account_id: cumar-qa-account-id
            image_suffix: "-qa"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VITE_API_BASE_URL=${{ matrix.api_url }}
          VITE_ACCOUNT_ID=${{ matrix.account_id }}
          VITE_APP_ENV=${{ matrix.environment }}

  update-k8s-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout k8s repo
      uses: actions/checkout@v4
      with:
        repository: andrescunier/simple_kubernetes
        token: ${{ secrets.GHCR_TOKEN }}
        
    - name: Update production image tag
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        sed -i "s|image: ghcr.io/andrescunier/diap-ecommerce:sha-.*|image: ghcr.io/andrescunier/diap-ecommerce:sha-${SHORT_SHA}|g" k8s/diap/diap-ecommerce-deployment.yaml || true
        
    - name: Update QA image tag
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        sed -i "s|image: ghcr.io/andrescunier/diap-ecommerce.*:sha-.*|image: ghcr.io/andrescunier/diap-ecommerce-qa:sha-${SHORT_SHA}|g" k8s/cumar-qa/cumar-ecommerce-deployment.yaml || true
        
    - name: Commit and push
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add -A
        git diff --staged --quiet || git commit -m "chore: update diap-ecommerce images to sha-$(echo ${{ github.sha }} | cut -c1-7)"
        git push
