# =============================================================================
# Ejemplo de Configuración Multi-Tenant con Docker Compose
# =============================================================================
# Este archivo demuestra cómo ejecutar múltiples instancias del mismo
# ecommerce para diferentes clientes, cada uno con su propia configuración.
# =============================================================================

version: '3.8'

services:
  # =========================================
  # Cliente 1: DIAP Store (Default)
  # =========================================
  diap-store:
    image: diap-ecommerce:latest
    container_name: diap-store
    ports:
      - "8081:80"
    environment:
      # API
      - API_URL=https://api.cumar.com.ar
      - ACCOUNT_ID=bed2df35-717f-4900-a4b1-7c3a7fb59b7c
      - ACCOUNT_SLUG=diap
      
      # App
      - APP_NAME=DIAP Store
      - COMPANY_NAME=DIAP Ingeniería S.A.
      - APP_SLOGAN=Tecnología profesional para empresas
      
      # Branding
      - LOGO_URL=/diap-logo.png
      - COLOR_PRIMARY=#2563eb
      - COLOR_PRIMARY_HOVER=#1d4ed8
      
      # B2B Features
      - HIDE_PRICES_FOR_GUESTS=true
      - REQUIRE_AUTH_FOR_CART=true
    networks:
      - ecommerce-network

  # =========================================
  # Cliente 2: Tech Solutions (Tema Verde)
  # =========================================
  tech-solutions:
    image: diap-ecommerce:latest
    container_name: tech-solutions
    ports:
      - "8082:80"
    environment:
      # API
      - API_URL=https://api.techsolutions.com
      - ACCOUNT_ID=aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
      - ACCOUNT_SLUG=techsolutions
      
      # App
      - APP_NAME=Tech Solutions
      - COMPANY_NAME=Tech Solutions S.R.L.
      - APP_SLOGAN=Tu proveedor de tecnología de confianza
      - APP_DESCRIPTION=Tech Solutions - Los mejores productos tecnológicos al mejor precio
      
      # Contact
      - CONTACT_EMAIL=ventas@techsolutions.com
      - CONTACT_PHONE=+54 11 5555-1234
      - CONTACT_ADDRESS=Córdoba, Argentina
      
      # Branding
      - LOGO_URL=https://cdn.techsolutions.com/logo.png
      - FAVICON_URL=https://cdn.techsolutions.com/favicon.ico
      - OG_IMAGE_URL=https://cdn.techsolutions.com/og-image.png
      
      # Tema Verde
      - COLOR_PRIMARY=#22c55e
      - COLOR_PRIMARY_HOVER=#16a34a
      - COLOR_PRIMARY_FOREGROUND=#ffffff
      
      # B2B Features (precios visibles)
      - HIDE_PRICES_FOR_GUESTS=false
      - REQUIRE_AUTH_FOR_CART=false
      
      # Social
      - INSTAGRAM_URL=https://instagram.com/techsolutions
      - FACEBOOK_URL=https://facebook.com/techsolutions
    networks:
      - ecommerce-network

  # =========================================
  # Cliente 3: Premium Corp (Tema Púrpura/Oscuro)
  # =========================================
  premium-corp:
    image: diap-ecommerce:latest
    container_name: premium-corp
    ports:
      - "8083:80"
    environment:
      # API
      - API_URL=https://api.premiumcorp.com
      - ACCOUNT_ID=11111111-2222-3333-4444-555555555555
      - ACCOUNT_SLUG=premium
      
      # App
      - APP_NAME=Premium Corp
      - COMPANY_NAME=Premium Corporation
      - APP_SLOGAN=Excelencia en tecnología empresarial
      - APP_DESCRIPTION=Premium Corp - Soluciones tecnológicas de alta gama para empresas líderes
      
      # Contact
      - CONTACT_EMAIL=enterprise@premiumcorp.com
      - CONTACT_PHONE=+54 11 4444-5678
      
      # Branding
      - LOGO_URL=https://assets.premiumcorp.com/logo-white.png
      - LOGO_DARK_URL=https://assets.premiumcorp.com/logo-dark.png
      
      # Tema Púrpura Premium
      - COLOR_PRIMARY=#8b5cf6
      - COLOR_PRIMARY_HOVER=#7c3aed
      - COLOR_PRIMARY_FOREGROUND=#ffffff
      - COLOR_SECONDARY=#1e1b4b
      - COLOR_SECONDARY_FOREGROUND=#e0e7ff
      
      # Tipografía Custom
      - FONT_FAMILY=Poppins, sans-serif
      - FONT_URL=https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap
      
      # B2B Estricto
      - HIDE_PRICES_FOR_GUESTS=true
      - REQUIRE_AUTH_FOR_CART=true
      - LOGIN_TO_VIEW_PRICES_MESSAGE=Acceda con su cuenta corporativa para ver precios
      - LOGIN_FOR_PRICES_CTA=Acceso Corporativo
      
      # Features
      - FEATURE_ANALYTICS=true
    networks:
      - ecommerce-network

  # =========================================
  # Cliente 4: Gaming Zone (Tema Rojo/Gamer)
  # =========================================
  gaming-zone:
    image: diap-ecommerce:latest
    container_name: gaming-zone
    ports:
      - "8084:80"
    environment:
      # API
      - API_URL=https://api.gamingzone.com.ar
      - ACCOUNT_ID=gamer111-2222-3333-4444-555555555555
      - ACCOUNT_SLUG=gamingzone
      
      # App
      - APP_NAME=Gaming Zone
      - COMPANY_NAME=Gaming Zone Argentina
      - APP_SLOGAN=Level Up Your Game
      - APP_DESCRIPTION=Gaming Zone - Todo lo que necesitas para gaming profesional
      
      # Contact
      - CONTACT_EMAIL=info@gamingzone.com.ar
      - CONTACT_PHONE=+54 11 7777-GAME
      
      # Branding
      - LOGO_URL=https://gamingzone.com.ar/assets/logo-gamer.png
      
      # Tema Rojo/Gaming
      - COLOR_PRIMARY=#ef4444
      - COLOR_PRIMARY_HOVER=#dc2626
      - COLOR_PRIMARY_FOREGROUND=#ffffff
      - COLOR_SECONDARY=#18181b
      - COLOR_SECONDARY_FOREGROUND=#fafafa
      - COLOR_BACKGROUND=#09090b
      - COLOR_FOREGROUND=#fafafa
      - COLOR_SURFACE=#18181b
      - COLOR_MUTED=#27272a
      - COLOR_MUTED_FOREGROUND=#a1a1aa
      - COLOR_BORDER=#3f3f46
      
      # Tipografía Gamer
      - FONT_FAMILY=Rajdhani, sans-serif
      - FONT_URL=https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap
      
      # B2C (precios siempre visibles)
      - HIDE_PRICES_FOR_GUESTS=false
      - REQUIRE_AUTH_FOR_CART=false
      
      # Social
      - INSTAGRAM_URL=https://instagram.com/gamingzone_ar
      - TWITTER_URL=https://twitter.com/gamingzone_ar
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

# =============================================================================
# USO:
# =============================================================================
# 1. Construir la imagen base:
#    docker build -t diap-ecommerce:latest .
#
# 2. Levantar todos los clientes:
#    docker-compose -f docker-compose.multi-tenant.yml up -d
#
# 3. Acceder a cada tienda:
#    - DIAP Store:      http://localhost:8081
#    - Tech Solutions:  http://localhost:8082
#    - Premium Corp:    http://localhost:8083
#    - Gaming Zone:     http://localhost:8084
#
# 4. Actualizar configuración:
#    docker-compose -f docker-compose.multi-tenant.yml up -d --force-recreate
# =============================================================================
