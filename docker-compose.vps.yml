version: '3.8'

services:
  # Aplicación Principal
  iamerican-app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: iamerican-ecommerce
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=${DOMAIN:-localhost}
      - VIRTUAL_PORT=80
    volumes:
      - ./logs:/var/log/nginx:rw
      - app_data:/app/data
    networks:
      - iamerican-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iamerican.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.iamerican.entrypoints=web"
      - "traefik.http.services.iamerican.loadbalancer.server.port=80"

  # Reverse Proxy con SSL automático (opcional)
