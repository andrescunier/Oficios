version: '3.8'

services:
  diap-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diap-frontend
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
      - VITE_APP_NAME=DIAP
      - VITE_COMPANY_NAME=DIAP Technology
      - VITE_CONTACT_EMAIL=info@diap.com
      - VITE_HIDE_PRICES_FOR_GUESTS=true
      - VITE_LOGIN_TO_VIEW_PRICES_MESSAGE=Inicie sesión para ver precios
    volumes:
      - ./nginx-vps.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    networks:
      - diap-network

networks:
  diap-network:
    driver: bridge
