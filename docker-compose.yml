version: '3.8'

services:
  iamerican-ecommerce:
    build: .
    container_name: iamerican-app
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/var/log/nginx
    networks:
      - iamerican-network

networks:
  iamerican-network:
    driver: bridge

