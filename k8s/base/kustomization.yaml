# =============================================================================
# Kustomization para Multi-Tenant
# =============================================================================
# Permite desplegar la misma aplicación para múltiples clientes
# usando overlays de Kustomize
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base común para todos los tenants
resources:
  - ../namespace.yaml
  - ../deployment.yaml
  - ../service.yaml
  - ../ingress.yaml

# ConfigMap generado desde variables
configMapGenerator:
  - name: diap-runtime-config
    behavior: create
    literals:
      # Estos valores se sobrescriben en cada overlay de tenant
      - API_URL=https://api.example.com
      - ACCOUNT_ID=default-account-id
      - ACCOUNT_SLUG=default
      - APP_NAME=DIAP Store
      - COMPANY_NAME=Company Name
      - COLOR_PRIMARY=#2563eb

# Cada tenant tiene su overlay en:
# k8s/overlays/diap/
# k8s/overlays/techsolutions/
# k8s/overlays/premium/
