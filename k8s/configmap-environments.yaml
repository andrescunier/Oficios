# =========================================
# CONFIGMAP PARA STAGING/DESARROLLO
# =========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: diap-config-staging
  namespace: diap
data:
  # API Configuration (Staging)
  VITE_API_BASE_URL: "https://api-staging.cumar.com.ar"
  VITE_ACCOUNT_ID: "bed2df35-717f-4900-a4b1-7c3a7fb59b7c"
  VITE_API_EXTRA_HEADERS: "{}"
  
  # Environment
  VITE_APP_ENV: "staging"
  VITE_APP_VERSION: "1.0.0-staging"
  VITE_DEBUG_MODE: "true"
  VITE_ENABLE_API_LOGGING: "true"
  NODE_ENV: "development"
  
  # Branding (mismo que producción)
  VITE_APP_NAME: "DIAP Store (Staging)"
  VITE_COMPANY_NAME: "DIAP INGENIERÍA S.A."
  VITE_APP_SLOGAN: "Tecnología profesional para empresas"
  VITE_APP_URL: "https://staging.diapstore.com"
  VITE_APP_DESCRIPTION: "DIAP Store - Distribuidora de productos tecnológicos de primera calidad. Soluciones profesionales B2B para tu empresa."
  
  # Contact (mismo que producción)
  VITE_CONTACT_EMAIL: "ventas@diapstore.com"
  VITE_CONTACT_PHONE: "+54 9 11 2631-0884"
  VITE_CONTACT_ADDRESS: "Buenos Aires, Argentina"
  
  # Logos (mismo que producción)
  VITE_LOGO_PATH: "/diap-logo.png"
  VITE_FAVICON_PATH: "/favicon.ico"
  VITE_HEADER_LOGO_PATH: "/diap-logo.png"
  
  # Social Media (vaciar para DIAP)
  VITE_FACEBOOK_URL: ""
  VITE_INSTAGRAM_URL: ""
  VITE_TWITTER_URL: ""
  VITE_LINKEDIN_URL: ""
  
  # Feature Flags (Staging - más permisivo)
  VITE_FEATURE_NOTIFICATIONS: "true"
  VITE_FEATURE_ANALYTICS: "false"  # Sin analytics en staging
  VITE_FEATURE_REAL_PAYMENTS: "false"  # Pagos demo en staging
  VITE_FEATURE_DEMO_MODE: "true"  # Modo demo activado
  
  # Shipping Features (mismo que producción)
  VITE_FEATURE_FREE_SHIPPING_TITLE: "Envío Gratis"
  VITE_FEATURE_FREE_SHIPPING_DESC: "En compras superiores a $50.000"
  VITE_FEATURE_FREE_RETURNS_TITLE: "Devolución Gratis"
  VITE_FEATURE_FREE_RETURNS_DESC: "Hasta 30 días para devolver"
  VITE_FEATURE_SECURE_PURCHASE_TITLE: "Compra Segura"
  VITE_FEATURE_SECURE_PURCHASE_DESC: "Protegemos tus datos"
  VITE_FEATURE_MULTIPLE_PAYMENTS_TITLE: "Múltiples Pagos"
  VITE_FEATURE_MULTIPLE_PAYMENTS_DESC: "Tarjetas, transferencia y más"
  
  # Colors (mismo que producción)
  VITE_PRIMARY_COLOR: "#2563eb"
  VITE_SECONDARY_COLOR: "#7c3aed"
  VITE_ACCENT_COLOR: "#059669"

---
# =========================================
# CONFIGMAP PARA DESARROLLO LOCAL
# =========================================
