apiVersion: v1
kind: ConfigMap
metadata:
  name: iamerican-config
  namespace: iamerican
data:
  # API Configuration
  VITE_API_BASE_URL: "https://api.cumar.com.ar"
  VITE_ACCOUNT_ID: "37b694f4-f2c9-4500-8e47-52b8ad8daaea"
  
  # Environment
  NODE_ENV: "production"
  VITE_APP_ENV: "production"
  
  # App Configuration
  VITE_APP_NAME: "iAmerican E-commerce"
  VITE_APP_VERSION: "1.0.0"
  
  # Feature Flags
  VITE_ENABLE_ANALYTICS: "true"
  VITE_ENABLE_NOTIFICATIONS: "true"
  VITE_ENABLE_REAL_PAYMENTS: "true"
  
  # Security
  VITE_ENABLE_HTTPS: "true"
  VITE_ENABLE_CORS: "true"

---
apiVersion: v1
kind: Secret
metadata:
  name: iamerican-secrets
  namespace: iamerican
type: Opaque
data:
  # Base64 encoded secrets (ejemplo)
  # Para generar: echo -n "tu-secret" | base64
  api-key: ""  # Agregar si necesitas API keys
  jwt-secret: ""  # Agregar si usas JWT