apiVersion: apps/v1
kind: Deployment
metadata:
  name: diap-ecommerce
  namespace: diap
  labels:
    app: diap-ecommerce
    version: v1.0.0
spec:
  replicas: 3  # 3 réplicas para alta disponibilidad
  selector:
    matchLabels:
      app: diap-ecommerce
  template:
    metadata:
      labels:
        app: diap-ecommerce
        version: v1.0.0
    spec:
      # Configurar pull de imagen desde GitHub Container Registry
      imagePullSecrets:
      - name: ghcr-secret
      
      containers:
      - name: diap-app
        image: ghcr.io/andrescunier/diap-ecommerce:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        
        env:
        - name: NODE_ENV
          value: "production"
        - name: VITE_API_URL
          value: "https://api.cumar.com.ar"
        - name: VITE_HIDE_PRICES_FOR_GUESTS
          value: "true"
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
      
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}
      
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: diap-ecommerce
  namespace: diap
  labels:
    app: diap-ecommerce
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: diap-ecommerce
