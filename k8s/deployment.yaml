apiVersion: apps/v1
kind: Deployment
metadata:
  name: diap-ecommerce
  namespace: diap
  labels:
    app: diap-ecommerce
    version: v1.0.1
spec:
  replicas: 3  # 3 réplicas para alta disponibilidad
  selector:
    matchLabels:
      app: diap-ecommerce
  template:
    metadata:
      labels:
        app: diap-ecommerce
        version: v1.0.1
    spec:
      containers:
      - name: diap-app
        image: ghcr.io/andrescunier/diap-ecommerce:v1.0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        envFrom:
        - configMapRef:
            name: diap-runtime-config
        - secretRef:
            name: diap-secrets
            optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}
      restartPolicy: Always