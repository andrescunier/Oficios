apiVersion: apps/v1
kind: Deployment
metadata:
  name: diap-ecommerce
  namespace: diap
  labels:
    app: diap-ecommerce
    version: v1
spec:
  replicas: 2  # 2 réplicas para alta disponibilidad
  selector:
    matchLabels:
      app: diap-ecommerce
  template:
    metadata:
      labels:
        app: diap-ecommerce
        version: v1
    spec:
      containers:
      - name: diap-app
        image: diap-ecommerce:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        # Variables de entorno B2B críticas
        - name: VITE_HIDE_PRICES_FOR_GUESTS
          value: "true"
        - name: VITE_REQUIRE_AUTH_FOR_CART
          value: "true"
        - name: VITE_APP_NAME
          value: "DIAP"
        - name: VITE_COMPANY_NAME
          value: "DIAP"
        - name: VITE_LOGO_PATH
          value: "/diap-logo.png"
        - name: VITE_LOGIN_TO_VIEW_PRICES_MESSAGE
          value: "Inicia sesión para ver precios"
        - name: VITE_LOGIN_FOR_PRICES_CTA
          value: "Iniciar Sesión"
        envFrom:
        - configMapRef:
            name: diap-config
            optional: true
        - secretRef:
            name: diap-secrets
            optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-logs
          mountPath: /var/log/nginx
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: diap-ecommerce
  namespace: diap
  labels:
    app: diap-ecommerce
spec:
  type: ClusterIP
  selector:
    app: diap-ecommerce
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
