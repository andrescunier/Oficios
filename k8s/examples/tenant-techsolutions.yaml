# =============================================================================
# Ejemplo: ConfigMap para Cliente "Tech Solutions"
# =============================================================================
# Cada cliente tiene su propio namespace y ConfigMap
# Misma imagen Docker, diferente configuración
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: techsolutions
  labels:
    tenant: techsolutions
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diap-runtime-config
  namespace: techsolutions
data:
  # API Configuration
  API_URL: "https://api.techsolutions.com"
  ACCOUNT_ID: "tech-1234-5678-9abc-def012345678"
  ACCOUNT_SLUG: "techsolutions"
  
  # App Configuration
  APP_NAME: "Tech Solutions Store"
  COMPANY_NAME: "Tech Solutions S.R.L."
  APP_SLOGAN: "Tu proveedor de tecnología de confianza"
  APP_DESCRIPTION: "Tech Solutions - Los mejores productos tecnológicos"
  APP_URL: "https://store.techsolutions.com"
  
  # Contact
  CONTACT_EMAIL: "ventas@techsolutions.com"
  CONTACT_PHONE: "+54 11 5555-1234"
  CONTACT_ADDRESS: "Córdoba, Argentina"
  
  # B2B Features (precios visibles para todos)
  HIDE_PRICES_FOR_GUESTS: "false"
  REQUIRE_AUTH_FOR_CART: "false"
  LOGIN_TO_VIEW_PRICES_MESSAGE: ""
  LOGIN_FOR_PRICES_CTA: ""
  
  # Branding - Images
  LOGO_URL: "https://cdn.techsolutions.com/logo.png"
  LOGO_DARK_URL: ""
  FAVICON_URL: "https://cdn.techsolutions.com/favicon.ico"
  BANNER_URL: ""
  OG_IMAGE_URL: "https://cdn.techsolutions.com/og-image.png"
  
  # Theme - Colores Verdes
  COLOR_PRIMARY: "#22c55e"
  COLOR_PRIMARY_HOVER: "#16a34a"
  COLOR_PRIMARY_FOREGROUND: "#ffffff"
  COLOR_SECONDARY: "#f0fdf4"
  COLOR_SECONDARY_FOREGROUND: "#14532d"
  COLOR_BACKGROUND: "#ffffff"
  COLOR_FOREGROUND: "#0f172a"
  COLOR_SURFACE: "#ffffff"
  COLOR_SURFACE_FOREGROUND: "#0f172a"
  COLOR_MUTED: "#f1f5f9"
  COLOR_MUTED_FOREGROUND: "#64748b"
  COLOR_BORDER: "#e2e8f0"
  COLOR_INPUT: "#e2e8f0"
  COLOR_RING: "#22c55e"
  COLOR_ACCENT: "#dcfce7"
  COLOR_ACCENT_FOREGROUND: "#14532d"
  COLOR_SUCCESS: "#22c55e"
  COLOR_WARNING: "#f59e0b"
  COLOR_ERROR: "#ef4444"
  
  # Typography
  FONT_FAMILY: ""
  FONT_URL: ""
  
  # Social Links
  FACEBOOK_URL: "https://facebook.com/techsolutions"
  INSTAGRAM_URL: "https://instagram.com/techsolutions"
  TWITTER_URL: ""
  LINKEDIN_URL: "https://linkedin.com/company/techsolutions"
  
  # Features
  FEATURE_NOTIFICATIONS: "true"
  FEATURE_ANALYTICS: "true"
  FEATURE_REAL_PAYMENTS: "false"
  
  # Debug
  DEBUG: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce
  namespace: techsolutions
  labels:
    app: ecommerce
    tenant: techsolutions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce
      tenant: techsolutions
  template:
    metadata:
      labels:
        app: ecommerce
        tenant: techsolutions
    spec:
      containers:
      - name: app
        image: ghcr.io/andrescunier/diap-ecommerce:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: diap-runtime-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce
  namespace: techsolutions
spec:
  selector:
    app: ecommerce
    tenant: techsolutions
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce
  namespace: techsolutions
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - store.techsolutions.com
    secretName: techsolutions-tls
  rules:
  - host: store.techsolutions.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce
            port:
              number: 80
