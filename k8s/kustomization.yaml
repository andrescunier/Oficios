apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iamerican

resources:
- namespace.yaml
- configmap.yaml
- deployment.yaml
- service.yaml
- hpa.yaml
- ingress.yaml

images:
- name: iamerican-ecommerce
  newTag: latest

commonLabels:
  app: iamerican-ecommerce
  version: v1.0.0
  environment: production

replicas:
- name: iamerican-ecommerce
  count: 3

patchesStrategicMerge:
- deployment-patch.yaml