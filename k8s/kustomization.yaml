apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: diap

resources:
- namespace.yaml
- configmap.yaml
- deployment.yaml
- service.yaml
- hpa.yaml
- ingress.yaml

images:
- name: iamerican-ecommerce
  newName: ghcr.io/andrescunier/diap-ecommerce  # GitHub Container Registry
  newTag: v1.1.0  # Versión con rebranding completo de DIAP Store

commonLabels:
  app: diap-ecommerce
  version: v1.1.0  # Nueva versión con rebranding completo de DIAP Store
  environment: production

replicas:
- name: diap-ecommerce
  count: 3

patchesStrategicMerge:
- deployment-patch.yaml