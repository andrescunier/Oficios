apiVersion: v1
kind: Service
metadata:
  name: iamerican-service
  namespace: iamerican
  labels:
    app: iamerican-ecommerce
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: iamerican-ecommerce

---
# LoadBalancer service (para cloud providers)
apiVersion: v1
kind: Service
metadata:
  name: iamerican-loadbalancer
  namespace: iamerican
  labels:
    app: iamerican-ecommerce
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 80
    protocol: TCP
    name: https
  selector:
    app: iamerican-ecommerce