<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="OficiosHub">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="45%" stop-color="#243B63"/>
      <stop offset="100%" stop-color="#EEF2F6"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D7DEE8"/>
      <stop offset="100%" stop-color="#C5CEDA"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M0 620 Q400 540 800 600 T1600 560 V900 H0 Z" fill="url(#floor)"/>
  <!-- workshop bench -->
  <rect x="180" y="520" width="420" height="28" rx="4" fill="#14213D"/>
  <rect x="210" y="548" width="28" height="120" fill="#243B63"/>
  <rect x="520" y="548" width="28" height="120" fill="#243B63"/>
  <!-- toolbox -->
  <rect x="260" y="430" width="160" height="90" rx="10" fill="#FCA311"/>
  <rect x="260" y="460" width="160" height="12" fill="#E08E00"/>
  <rect x="320" y="448" width="40" height="14" rx="4" fill="#14213D"/>
  <!-- person silhouette with tools -->
  <circle cx="980" cy="340" r="42" fill="#F8FAFC"/>
  <path d="M920 520 C930 420 1030 420 1040 520 Z" fill="#F8FAFC"/>
  <rect x="1000" y="390" width="14" height="110" rx="4" fill="#FCA311" transform="rotate(18 1007 445)"/>
  <circle cx="1025" cy="500" r="18" fill="#14213D"/>
  <!-- second person -->
  <circle cx="1180" cy="360" r="36" fill="#E2E8F0"/>
  <path d="M1128 530 C1140 440 1220 440 1232 530 Z" fill="#E2E8F0"/>
  <rect x="1210" y="410" width="90" height="14" rx="4" fill="#FCA311" transform="rotate(-12 1255 417)"/>
  <!-- accent bars -->
  <rect x="0" y="0" width="18" height="900" fill="#FCA311"/>
  <text x="80" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="92" font-weight="800" fill="#FFFFFF">OficiosHub</text>
  <text x="80" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="600" fill="#FCA311">Servicios de personas para personas</text>
</svg>
